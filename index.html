<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funko AI - LAB Studio 3D Real</title>
    <style>
        :root {
            --bg: #0b0c10;
            --surface: #1f2833;
            --accent: #45f3ff;
            --text: #c5c6c7;
            --text-bright: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px 20px; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: var(--text-bright); font-size: 2.5rem; letter-spacing: 2px; }
        header h1 span { color: var(--accent); }

        .grid-main { display: flex; gap: 30px; margin-bottom: 40px; }
        .col { flex: 1; min-width: 0; }

        .card { background: var(--surface); padding: 30px; border-radius: 16px; border: 1px solid rgba(69, 243, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: space-between; }
        h2 { color: var(--text-bright); margin-bottom: 20px; font-size: 1.4rem; border-left: 4px solid var(--accent); padding-left: 10px; }

        textarea { width: 100%; padding: 14px; background: #151a21; border: 1px solid #2f3b4c; border-radius: 8px; color: var(--text-bright); margin-bottom: 15px; font-size: 1rem; resize: none; }
        textarea:focus { border-color: var(--accent); outline: none; }
        
        .file-upload { background: #151a21; border: 2px dashed #2f3b4c; padding: 25px; border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 15px; }
        .file-upload input { display: none; }

        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #00cdac, #02aab0); color: var(--bg); font-weight: bold; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(2, 170, 176, 0.4); }

        /* Container do Visualizador 3D Real (Three.js Canvas) */
        #canvas-3d-container { width: 100%; height: 380px; background: #11161d; border-radius: 12px; border: 1px solid #2f3b4c; position: relative; overflow: hidden; }
        
        .hint-360 { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); pointer-events: none; z-index: 10; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-item { background: var(--surface); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .gallery-item:hover { transform: scale(1.03); border-color: var(--accent); }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; }
        .gallery-item .info { padding: 12px; font-size: 0.9rem; color: var(--text-bright); text-align: center; }

        .hidden { display: none; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>FUNKO <span>AI</span> 3D ENGINE</h1>
        <p>Geração volumétrica de alta fidelidade com renderizador 3D interativo</p>
    </header>

    <div id="auth-panel" class="card" style="max-width: 450px; margin: 0 auto 40px auto;">
        <h2>🔐 Inicializar Laboratório</h2>
        <input type="text" id="username" placeholder="Usuário ou E-mail" style="width: 100%; padding: 14px; background: #151a21; border: 1px solid #2f3b4c; border-radius: 8px; color: #fff; margin-bottom: 15px;">
        <input type="password" id="password" placeholder="Senha" style="width: 100%; padding: 14px; background: #151a21; border: 1px solid #2f3b4c; border-radius: 8px; color: #fff; margin-bottom: 15px;">
        <button onclick="realizarLogin()">Autenticar Engenharia</button>
    </div>

    <div id="main-workspace" class="hidden">
        <div class="grid-main">
            <div class="col">
                <div class="card" style="height: 460px;">
                    <h2>🧬 Escaneamento de Fidelidade Corporal</h2>
                    
                    <label class="file-upload">
                        <input type="file" id="foto-usuario" accept="image/*" onchange="fotoSelecionada()">
                        <div id="upload-label">📸 Carregar Foto de Alta Resolução (Rosto/Roupa)</div>
                    </label>

                    <textarea id="prompt-custom" rows="4" placeholder="Especifique os detalhes fiéis: Formato do cabelo, marcas de expressão, cor exata dos olhos, estampas da jaqueta, texturas de tecido, joias ou acessórios marcantes..."></textarea>
                    
                    <button id="btn-gerar" onclick="iniciarGeracao()">Gerar Geometria e Textura 3D</button>
                </div>
            </div>

            <div class="col">
                <div class="card" style="height: 460px;">
                    <h2>🔮 Viewport 3D Real (WebGL Canvas)</h2>
                    
                    <div id="canvas-3d-container">
                        <div class="hint-360">Use o mouse/touch para orbitar, girar e dar zoom no modelo 3D</div>
                    </div>

                    <button id="btn-impressao" class="hidden" onclick="irParaImpressao()" style="background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; margin-top: 15px;">Exportar para Fatiamento 3D →</button>
                </div>
            </div>
        </div>

        <div class="explorer-section">
            <h2>🌍 Banco de Dados de Modelos Gerados</h2>
            <div class="gallery" id="comunidade-galeria"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
