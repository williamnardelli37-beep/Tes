<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTag ERP - Painel do Fabricante</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --primary: #111111;
            --primary-hover: #333333;
            --bg: #f4f6f8;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --border: #dddddd;
            --accent: #0066cc;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: var(--bg); margin: 0; padding: 40px 20px; color: var(--text); 
            display: flex; justify-content: center;
        }

        .container { 
            width: 100%; max-width: 520px; background: var(--card-bg); 
            padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--border); box-sizing: border-box;
        }

        h2 { font-size: 24px; font-weight: 800; margin: 0 0 5px 0; letter-spacing: -0.5px; text-align: center; }
        p.subtitle { color: #666; font-size: 14px; margin: 0 0 30px 0; text-align: center; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #555; }
        
        select, input { 
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border); 
            font-size: 15px; box-sizing: border-box; background: #fafafa; transition: all 0.2s;
        }
        select:focus, input:focus { border-color: var(--accent); background: #fff; outline: none; }

        button { 
            width: 100%; padding: 16px; border-radius: 10px; background-color: var(--primary); 
            color: white; border: none; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        
        /* Área de Impressão da Etiqueta */
        .print-area-wrapper { display: none; margin-top: 35px; text-align: center; }
        
        .print-area {
            background: white; border: 1px dashed #000; padding: 20px;
            width: 62mm; margin: 0 auto 20px auto; box-sizing: border-box; text-align: center; color: #000;
        }
        .brand-label { font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .desc-tag { font-size: 12px; font-weight: 700; margin: 2px 0; text-transform: uppercase; }
        .color-tag { font-size: 11px; color: #555; margin-bottom: 5px; font-weight: bold; }
        
        .barcode-container { width: 100%; margin: 8px 0; background: #fff; }
        .barcode-container svg { width: 100%; max-height: 65px; }

        .price-tag { font-size: 22px; font-weight: 900; margin-top: 5px; letter-spacing: -0.5px; }

        .btn-print { background-color: #555; }
        .btn-print:hover { background-color: #333; }

        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 62mm; border: none; padding: 0; margin: 0; }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🏭 EcoTag Enterprise</h2>
        <p class="subtitle">Configuração de Produtos e Preços do Vendedor</p>
        
        <div class="form-group">
            <label for="tipo-roupa">Selecione o Produto e Cor</label>
            <select id="tipo-roupa">
                <option value="A102" data-nome="Camiseta Básica" data-cor="Preto Sólido">Camiseta Básica - Preto Sólido (A102)</option>
                <option value="A103" data-nome="Camiseta Básica" data-cor="Branco Off-White">Camiseta Básica - Branco Off-White (A103)</option>
                <option value="J106" data-nome="Calça Jeans Slim" data-cor="Azul Denim Tradicional">Calça Jeans Slim - Azul Denim (J106)</option>
                <option value="J107" data-nome="Calça Jeans Slim" data-cor="Preto Estonado">Calça Jeans Slim - Preto Estonado (J107)</option>
                <option value="L105" data-nome="Casaco de Lã Winter" data-cor="Marrom Camel">Casaco de Lã - Marrom Camel (L105)</option>
                <option value="P103" data-nome="Jaqueta Corta-Vento" data-cor="Verde Militar">Jaqueta Corta-Vento - Verde Militar (P103)</option>
                <option value="I104" data-nome="Camisa Casual Linho" data-cor="Areia Natural">Camisa Linho - Areia Natural (I104)</option>
                <option value="S102" data-nome="Vestido Midi Fluido" data-cor="Vermelho Rubi">Vestido Midi - Vermelho Rubi (S102)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="preco-roupa">Defina o Preço de Venda (R$)</label>
            <input type="number" id="preco-roupa" value="149.90" step="0.01">
        </div>

        <button onclick="gerarEtiqueta()">Gerar Código de Barras</button>

        <div id="etiqueta-wrapper" class="print-area-wrapper">
            <div class="print-area">
                <div class="brand-label">EcoTag Renner-Style</div>
                <div class="desc-tag" id="lbl-nome">Produto</div>
                <div class="color-tag" id="lbl-cor">Cor: Unica</div>
                
                <div class="barcode-container">
                    <svg id="barcode"></svg>
                </div>
                
                <div class="price-tag" id="lbl-preco">R$ 0,00</div>
            </div>
            <button class="btn-print" onclick="window.print()">🖨️ Imprimir Etiqueta</button>
        </div>
    </div>

    <script>
        function gerarEtiqueta() {
            const combo = document.getElementById('tipo-roupa');
            const codigo = combo.value;
            const nomePeca = combo.options[combo.selectedIndex].getAttribute('data-nome');
            const corPeca = combo.options[combo.selectedIndex].getAttribute('data-cor');
            const precoDefinido = parseFloat(document.getElementById('preco-roupa').value).toFixed(2).replace('.', ',');

            document.getElementById('lbl-nome').innerText = nomePeca;
            document.getElementById('lbl-cor').innerText = "COR: " + corPeca;
            document.getElementById('lbl-preco').innerText = 'R$ ' + precoDefinido;

            // SALVA O PREÇO DINAMICAMENTE PARA O APP DO CLIENTE LER
            localStorage.setItem('preco_dinamico_' + codigo, 'R$ ' + precoDefinido);

            // Código de barras espesso otimizado para focagem rápida
            JsBarcode("#barcode", codigo, {
                format: "CODE128",
                width: 3,         
                height: 55,        
                displayValue: true, 
                fontSize: 15,
                margin: 12,        
                background: "#ffffff",
                lineColor: "#000000"
            });

            document.getElementById('etiqueta-wrapper').style.display = 'block';
        }
    </script>
</body>
</html>
