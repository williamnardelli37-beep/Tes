<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTag - Scanner Premium</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --primary: #ffffff;
            --text-muted: #888888;
            --border: #222222;
            --success: #00e676;
            --danger: #ff1744;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); color: #ffffff; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 420px; background: var(--surface);
            padding: 30px; border-radius: 24px; border: 1px solid var(--border);
            box-sizing: border-box; text-align: center;
        }

        h2 { font-size: 20px; font-weight: 700; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        p.desc { color: var(--text-muted); font-size: 13px; margin: 0 0 25px 0; }

        /* ÁREA DE ESCANEAMENTO TOTALMENTE LIVRE E LIMPA */
        .scanner-container {
            position: relative; width: 100%; aspect-ratio: 4/3;
            background: #000; border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border); margin-bottom: 25px;
        }
        
        #reader { width: 100% !important; height: 100% !important; border: none !important; }
        
        /* Remove botões e textos nativos poluídos da biblioteca */
        #reader__dashboard, #reader__status_span, #reader img { display: none !important; }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

        /* Linha de Scanner (Mira) */
        .scanner-laser {
            position: absolute; top: 50%; left: 5%; width: 90%; height: 2px;
            background-color: var(--success); box-shadow: 0 0 12px var(--success);
            animation: scanAnimation 2.5s infinite ease-in-out; pointer-events: none; z-index: 10;
        }
        @keyframes scanAnimation {
            0% { top: 15%; }
            50% { top: 85%; }
            100% { top: 15%; }
        }

        /* Aviso de "Próxima leitura liberada" */
        .countdown-alert {
            display: none; background: rgba(0, 230, 118, 0.15); color: var(--success);
            padding: 8px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-bottom: 15px;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 6px; }
        
        input {
            width: 100%; padding: 14px; border-radius: 12px; background: #222; border: 1px solid var(--border);
            color: #fff; font-size: 16px; text-align: center; box-sizing: border-box; font-weight: bold;
        }

        /* Card de Resultado Nível Renner */
        .result-card {
            display: none; margin-top: 25px; padding: 20px; border-radius: 16px;
            background: #1d1d1d; border: 1px solid var(--border); text-align: left;
        }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .result-title { font-size: 16px; font-weight: 700; margin: 0; }
        
        /* Preço destacado em tamanho maior */
        .price-badge { font-size: 22px; font-weight: 800; color: #fff; margin: 10px 0; display: block; }

        .info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: var(--text-muted); }
        .info-row strong { color: #fff; }
        .advice-box { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); font-size: 13px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>📱 Consulta EcoTag</h2>
        <p class="desc">Aponte para o código de barras gerado</p>

        <div class="scanner-container">
            <div id="reader"></div>
            <div class="scanner-laser" id="laser"></div>
        </div>

        <div id="countdown-msg" class="countdown-alert">Aguardando próxima etiqueta...</div>

        <div class="input-group">
            <label>Código Identificado</label>
            <input type="text" id="codigo-manual" placeholder="Aproxime da etiqueta..." readonly>
        </div>

        <div id="resultado-app" class="result-card">
            <div class="result-header">
                <h3 id="txt-nome" class="result-title">Nome da Peça</h3>
            </div>
            
            <div class="price-badge" id="txt-preco">R$ 0,00</div>

            <div class="info-row"><span>ID Técnico:</span> <strong id="txt-id">-</strong></div>
            <div class="info-row"><span>Composição:</span> <strong id="txt-material">-</strong></div>
            <div class="info-row"><span>Expectativa:</span> <strong id="txt-duracao">-</strong></div>
            <div id="txt-diagnostico" class="advice-box"></div>
        </div>
    </div>

    <script>
        // Banco de dados simulando os produtos e preços padrão cadastrados no sistema Renner-Style
        const bancoDadosLocal = {
            "A102": { nome: "Camiseta Básica de Algodão", tecido: "Algodão Sustentável", anos: 2, preco: "R$ 89,90" },
            "J106": { nome: "Calça Jeans Premium", tecido: "Jeans Denim", anos: 6, preco: "R$ 199,90" },
            "L105": { nome: "Casaco de Inverno", tecido: "Lã Natural", anos: 5, preco: "R$ 259,90" },
            "P103": { nome: "Jaqueta Corta-Vento", tecido: "Poliéster Sintético", anos: 3, preco: "R$ 149,90" },
            "I104": { nome: "Camisa Social Elegance", tecido: "Linho Rústico", anos: 4, preco: "R$ 129,90" },
            "S102": { nome: "Vestido de Gala Seda", tecido: "Seda Fina", anos: 2, preco: "R$ 319,90" }
        };

        let scannerPronto = true; // Controla se o app aceita um novo escaneamento

        // Função do BIP de confirmação (Áudio de caixa registradora de loja)
        function darBip() {
            try {
                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let oscillator = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 1150; // Tom agudo comercial
                gainNode.gain.value = 0.15; // Volume confortável
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                setTimeout(() => oscillator.stop(), 110);
            } catch(e) { console.log("Áudio bloqueado pelo navegador."); }
        }

        // Inicialização automática da câmera traseira
        function iniciarCamera() {
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length) {
                    let cameraId = devices[0].id;
                    // Tenta forçar o uso da câmera de trás do smartphone
                    for (let device of devices) {
                        if (device.label.toLowerCase().includes('back') || device.label.toLowerCase().includes('traseira')) {
                            cameraId = device.id;
                            break;
                        }
                    }
                    
                    const html5QrCode = new Html5Qrcode("reader");
                    html5QrCode.start(
                        cameraId, 
                        {
                            fps: 25, // Leitura fluida frame-a-frame
                            qrbox: (width, height) => { return { width: width * 0.8, height: height * 0.4 } }
                        },
                        (decodedText) => {
                            let cod = decodedText.toUpperCase().trim();
                            
                            // Só processa se o scanner estiver liberado e o produto existir
                            if (scannerPronto && bancoDadosLocal[cod]) {
                                scannerPronto = false; // Bloqueia temporariamente para não "bipar" a mesma peça mil vezes seguidas
                                
                                darBip(); // 1. Dá o Bip imediatamente
                                document.getElementById('codigo-manual').value = cod;
                                exibirDados(cod); // 2. Exibe os dados e o VALOR
                                
                                // 3. Prepara o reset para poder escanear depois de novo (após 3 segundos)
                                prepararProximaLeitura();
                            }
                        },
                        (errorMessage) => { /* Busca silenciosa por linhas */ }
                    ).catch(err => { console.error("Erro ao transmitir vídeo.", err); });
                }
            }).catch(err => { alert("Autorize o acesso à câmera e use HTTPS."); });
        }

        function exibirDados(cod) {
            const pecaInfo = bancoDadosLocal[cod];
            document.getElementById('txt-nome').innerText = pecaInfo.nome;
            document.getElementById('txt-preco').innerText = pecaInfo.preco; // Mostra o valor correspondente
            document.getElementById('txt-id').innerText = cod;
            document.getElementById('txt-material').innerText = pecaInfo.tecido;
            document.getElementById('txt-duracao').innerText = `${pecaInfo.anos} Anos`;

            const diagnostico = document.getElementById('txt-diagnostico');
            diagnostico.innerHTML = `✓ <strong>Leitura Concluída!</strong> Dados coletados com sucesso no banco Renner-Style.`;
            diagnostico.style.color = "var(--success)";

            document.getElementById('resultado-app').style.display = 'block';
            document.getElementById('laser').style.backgroundColor = "var(--danger)"; // Muda a linha de mira para vermelho (bloqueado)
        }

        function prepararProximaLeitura() {
            const msg = document.getElementById('countdown-msg');
            msg.style.display = 'block';

            // Aguarda 3 segundos com o resultado na tela, depois limpa tudo e reativa o scanner automaticamente
            setTimeout(() => {
                scannerPronto = true;
                msg.style.display = 'none';
                document.getElementById('laser').style.backgroundColor = "var(--success)"; // Linha volta a ficar verde (pronto)
                document.getElementById('codigo-manual').value = "";
                document.getElementById('resultado-app').style.display = 'none'; // Esconde o card antigo para aguardar a nova peça
            }, 3000); 
        }

        window.addEventListener('DOMContentLoaded', iniciarCamera);
    </script>
</body>
</html>
