<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTag ERP - Painel do Fabricante</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --primary: #0a0a0a;
            --primary-hover: #262626;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --border: #e5e5e5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 40px 20px; color: var(--text); 
            display: flex; justify-content: center;
        }

        .container { 
            width: 100%; max-width: 500px; background: var(--card-bg); 
            padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        
        select, input { 
            width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); 
            font-size: 15px; box-sizing: border-box; background: #fafafa;
        }

        button { 
            width: 100%; padding: 15px; border-radius: 8px; background-color: var(--primary); 
            color: white; border: none; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 10px;
        }
        button:hover { background-color: var(--primary-hover); }
        
        /* Área da Etiqueta Física Otimizada */
        .print-area-wrapper { display: none; margin-top: 35px; text-align: center; }
        
        .print-area {
            background: white;
            border: 1px dashed #000;
            padding: 10px;
            width: 62mm; /* Largura padrão de etiquetas de gôndola/têxtil */
            margin: 0 auto 15px auto;
            box-sizing: border-box;
            text-align: center;
            color: #000;
        }
        .brand-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
        .desc-tag { font-size: 11px; font-weight: 600; margin: 2px 0; text-transform: uppercase; }
        
        /* Container do SVG do Código de Barras */
        .barcode-container { width: 100%; margin: 5px 0; background: #fff; }
        .barcode-container svg { width: 100%; max-height: 65px; }

        .price-tag { font-size: 20px; font-weight: 800; margin-top: 5px; }

        .btn-print { background-color: #444; }

        /* Regras rígidas de Impressão (Esconde tudo exceto a etiqueta de 62mm) */
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { 
                position: absolute; left: 0; top: 0; 
                width: 62mm; border: none; padding: 0; margin: 0;
            }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🏭 EcoTag Enterprise</h2>
        <p class="subtitle">Geração de Código de Barras e Etiquetas Comerciais</p>
        
        <div class="form-group">
            <label for="tipo-roupa">Modelo do Produto</label>
            <select id="tipo-roupa">
                <option value="A102" data-nome="Camiseta de Algodão">Camiseta de Algodão (A102)</option>
                <option value="J106" data-nome="Calça Jeans Premium">Calça Jeans Premium (J106)</option>
                <option value="L105" data-nome="Casaco de Lã">Casaco de Lã de Inverno (L105)</option>
                <option value="P103" data-nome="Jaqueta de Poliéster">Jaqueta de Poliéster (P103)</option>
                <option value="I104" data-nome="Camisa de Linho">Camisa Fina de Linho (I104)</option>
                <option value="S102" data-nome="Vestido de Seda">Vestido de Seda Leve (S102)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="preco-roupa">Preço de Venda (R$)</label>
            <input type="number" id="preco-roupa" value="129.90" step="0.01">
        </div>

        <button onclick="gerarEtiqueta()">Gerar Código Dinâmico</button>

        <div id="etiqueta-wrapper" class="print-area-wrapper">
            <div class="print-area">
                <div class="brand-label">EcoTag Renner-Style</div>
                <div class="desc-tag" id="lbl-nome">Produto</div>
                
                <div class="barcode-container">
                    <svg id="barcode"></svg>
                </div>
                
                <div class="price-tag" id="lbl-preco">R$ 0,00</div>
            </div>
            <button class="btn-print" onclick="window.print()">🖨️ Imprimir Etiqueta</button>
        </div>
    </div>

    <script>
        function gerarEtiqueta() {
            const combo = document.getElementById('tipo-roupa');
            const codigo = combo.value;
            const nomePeca = combo.options[combo.selectedIndex].getAttribute('data-nome');
            const preco = parseFloat(document.getElementById('preco-roupa').value).toFixed(2).replace('.', ',');

            document.getElementById('lbl-nome').innerText = nomePeca;
            document.getElementById('lbl-preco').innerText = 'R$ ' + preco;

            // GERADOR DO CÓDIGO COM LINHAS MAIS GROSSAS E MARGENS (Quiet Zone) PARA FACILITAR A LEITURA DA CÂMARA
            JsBarcode("#barcode", codigo, {
                format: "CODE128",
                width: 3,         // Barras mais largas para leitura imediata no monitor
                height: 55,        // Altura perfeita para focar com o telemóvel
                displayValue: true, 
                fontSize: 15,
                margin: 12,        // Espaço em branco obrigatório à volta do código de barras
                background: "#ffffff",
                lineColor: "#000000"
            });

            document.getElementById('etiqueta-wrapper').style.display = 'block';
        }
    </script>
</body>
</html>
