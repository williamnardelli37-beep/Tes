<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTag - Terminal do Consumidor</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --primary: #ffffff;
            --text-muted: #a0a0a0;
            --border: #292929;
            --success: #00e676;
            --accent: #2979ff;
            --warning: #ffb300;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); color: #ffffff; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 430px; background: var(--surface);
            padding: 30px; border-radius: 24px; border: 1px solid var(--border);
            box-sizing: border-box; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        h2 { font-size: 22px; font-weight: 800; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        p.desc { color: var(--text-muted); font-size: 13px; margin: 0 0 25px 0; }

        .scanner-container {
            position: relative; width: 100%; aspect-ratio: 4/3;
            background: #000; border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border); margin-bottom: 20px;
        }
        
        #reader { width: 100% !important; height: 100% !important; border: none !important; }
        #reader__dashboard, #reader__status_span, #reader img { display: none !important; }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

        .scanner-laser {
            position: absolute; top: 50%; left: 5%; width: 90%; height: 2px;
            background-color: var(--success); box-shadow: 0 0 14px var(--success);
            animation: scanAnimation 2s infinite ease-in-out; pointer-events: none; z-index: 10;
        }
        @keyframes scanAnimation {
            0% { top: 15%; }
            50% { top: 85%; }
            100% { top: 15%; }
        }

        .btn-next {
            display: none; width: 100%; padding: 15px; margin-bottom: 20px;
            background: var(--accent); color: white; border: none; font-weight: 700;
            border-radius: 12px; font-size: 15px; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-next:hover { opacity: 0.9; }

        .result-card {
            display: none; margin-top: 15px; padding: 22px; border-radius: 16px;
            background: #222222; border: 1px solid var(--border); text-align: left;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .result-title { font-size: 18px; font-weight: 800; margin: 0 0 2px 0; text-transform: uppercase; }
        .result-color { font-size: 13px; color: #a0a0a0; margin-bottom: 15px; font-weight: 500; }
        
        .price-badge { font-size: 32px; font-weight: 900; color: #ffffff; margin-bottom: 20px; letter-spacing: -0.5px; }

        .metrics-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
        }
        .metric-box {
            background: #2d2d2d; border: 1px solid var(--border); padding: 12px; border-radius: 10px; text-align: center;
        }
        .metric-val { font-size: 18px; font-weight: 800; color: var(--warning); display: block; margin-top: 4px; }
        .metric-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }

        .info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: var(--text-muted); }
        .info-row strong { color: #fff; }
        
        .advice-box { 
            margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); 
            font-size: 13px; line-height: 1.4; color: var(--success); font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>📱 Consulta EcoTag</h2>
        <p class="desc">Aponte para o código de barras da peça</p>

        <div class="scanner-container">
            <div id="reader"></div>
            <div class="scanner-laser" id="laser"></div>
        </div>

        <button id="btn-reset" class="btn-next" onclick="liberarProximoEscaneamento()">🔄 Escanear Próxima Peça</button>

        <div id="resultado-app" class="result-card">
            <h3 id="txt-nome" class="result-title">Nome do Produto</h3>
            <div id="txt-cor" class="result-color">COR: -</div>
            
            <div class="price-badge" id="txt-preco">R$ 0,00</div>

            <div class="metrics-grid">
                <div class="metric-box">
                    <span class="metric-label">Limite Lavagens</span>
                    <strong class="metric-val" id="txt-lavagens">0</strong>
                </div>
                <div class="metric-box">
                    <span class="metric-label">Limite Secagem</span>
                    <strong class="metric-val" id="txt-secagem">0</strong>
                </div>
            </div>

            <div class="info-row"><span>SKU Técnico:</span> <strong id="txt-id">-</strong></div>
            <div class="info-row"><span>Composição:</span> <strong id="txt-material">-</strong></div>
            <div class="info-row"><span>Ciclo de Vida Total:</span> <strong id="txt-duracao">-</strong></div>
            <div id="txt-diagnostico" class="advice-box"></div>
        </div>
    </div>

    <script>
        // Catálogo oficial com dados técnicos e valores fixos de mercado
        const bancoDadosLocal = {
            "A102": { nome: "Camiseta Básica", cor: "Preto Sólido", tecido: "Algodão Sustentável 100%", anos: 2, lavagens: 50, secagem: 30, preco: "R$ 89,90" },
            "A103": { nome: "Camiseta Básica", cor: "Branco Off-White", tecido: "Algodão Sustentável 100%", anos: 2, lavagens: 50, secagem: 30, preco: "R$ 89,90" },
            "J106": { nome: "Calça Jeans Slim", cor: "Azul Denim Tradicional", tecido: "Jeans Denim Premium", anos: 6, lavagens: 120, secagem: 60, preco: "R$ 199,90" },
            "J107": { nome: "Calça Jeans Slim", cor: "Preto Estonado", tecido: "Jeans Heavy Denim", anos: 6, lavagens: 120, secagem: 60, preco: "R$ 219,90" },
            "L105": { nome: "Casaco de Lã Winter", cor: "Marrom Camel", tecido: "Lã Fria Natural", anos: 5, lavagens: 15, secagem: 0, preco: "R$ 299,90" }, // Lã não deve ir à secadora
            "P103": { nome: "Jaqueta Corta-Vento", cor: "Verde Militar", tecido: "Poliéster Impermeável", anos: 3, lavagens: 80, secagem: 40, preco: "R$ 159,90" },
            "I104": { nome: "Camisa Casual Linho", cor: "Areia Natural", tecido: "Linho Puro Rústico", anos: 4, lavagens: 40, secagem: 20, preco: "R$ 149,90" },
            "S102": { nome: "Vestido Midi Fluido", cor: "Vermelho Rubi", tecido: "Seda Acetinada Genuína", anos: 2, lavagens: 20, secagem: 0, preco: "R$ 349,90" } // Seda proibida em secadoras
        };

        let leitorAtivo = true;

        function darBip() {
            try {
                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let oscillator = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = 1180; 
                gainNode.gain.value = 0.15; 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                setTimeout(() => oscillator.stop(), 105);
            } catch(e) { console.log("Áudio aguardando clique inicial."); }
        }

        function iniciarCamera() {
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length) {
                    let cameraId = devices[0].id;
                    for (let device of devices) {
                        const label = device.label.toLowerCase();
                        if (label.includes('back') || label.includes('traseira') || label.includes('ambiente')) {
                            cameraId = device.id;
                            break;
                        }
                    }
                    
                    const html5QrCode = new Html5Qrcode("reader");
                    html5QrCode.start(
                        cameraId, 
                        {
                            fps: 30,
                            formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39, Html5QrcodeSupportedFormats.EAN_13 ],
                            qrbox: (width, height) => { return { width: Math.min(width * 0.85, 320), height: Math.min(height * 0.45, 140) } }
                        },
                        (decodedText) => {
                            let cod = decodedText.toUpperCase().trim();
                            if (leitorAtivo && bancoDadosLocal[cod]) {
                                leitorAtivo = false; 
                                darBip();
                                exibirDados(cod);
                            }
                        },
                        (errorMessage) => { }
                    ).catch(err => { console.error(err); });
                }
            }).catch(err => { alert("Permita o acesso à câmera."); });
        }

        function exibirDados(cod) {
            const pecaInfo = bancoDadosLocal[cod];

            document.getElementById('txt-nome').innerText = pecaInfo.nome;
            document.getElementById('txt-cor').innerText = "COR: " + pecaInfo.cor;
            document.getElementById('txt-preco').innerText = pecaInfo.preco; 
            document.getElementById('txt-lavagens').innerText = pecaInfo.lavagens + "x";
            
            // Tratamento especial para itens que não podem ir à secadora rotativa
            document.getElementById('txt-secagem').innerText = pecaInfo.secagem === 0 ? "Proibido" : pecaInfo.secagem + "x";
            
            document.getElementById('txt-id').innerText = cod;
            document.getElementById('txt-material').innerText = pecaInfo.tecido;
            document.getElementById('txt-duracao').innerText = `${pecaInfo.anos} Anos`;

            document.getElementById('txt-diagnostico').innerHTML = `✓ <strong>EcoTag Validada:</strong> Este material suporta até ${pecaInfo.lavagens} ciclos de higienização mantendo a estrutura original das fibras moleculares.`;
            
            document.getElementById('resultado-app').style.display = 'block';
            document.getElementById('btn-reset').style.display = 'block';
            document.getElementById('laser').style.backgroundColor = "#ff1744"; 
        }

        function liberarProximoEscaneamento() {
            leitorAtivo = true; 
            document.getElementById('btn-reset').style.display = 'none';
            document.getElementById('resultado-app').style.display = 'none';
            document.getElementById('laser').style.backgroundColor = "var(--success)"; 
        }

        window.addEventListener('DOMContentLoaded', iniciarCamera);
    </script>
</body>
</html>
